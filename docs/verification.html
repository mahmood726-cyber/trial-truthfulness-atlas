<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TTA verification (v0.1.1)</title>
<style>body { font-family: -apple-system, system-ui, sans-serif; max-width: 900px;
       margin: 1em auto; padding: 0 1em; color: #1a1a1a; }
header { display: flex; justify-content: space-between; align-items: baseline; }
.trial-card { border: 1px solid #ccc; border-radius: 8px; padding: 1em;
              margin-top: 1em; background: #fcfcfc; }
.trial-card h2 { margin-top: 0; }
.flag-row { display: grid; grid-template-columns: 200px 1fr; gap: 0.4em;
            padding: 0.4em 0; border-bottom: 1px dashed #eee; }
.flag-label { font-weight: bold; color: #333; }
.flag-value { font-family: monospace; }
.flag-value-flagged, .flag-value-required_not_posted,
.flag-value-substantively_different, .flag-value-flipped,
.flag-value-unbridgeable { color: #b00020; }
.flag-value-identical, .flag-value-concordant,
.flag-value-not_flagged, .flag-value-posted { color: #006d32; }
.flag-value-unscoreable, .flag-value-refinement,
.flag-value-not_required { color: #886000; }
.controls { margin-top: 1em; }
.controls button { margin-right: 0.5em; padding: 0.5em 1em; font-size: 1em;
                   border-radius: 4px; border: 1px solid #888; cursor: pointer; }
.controls button.confirm { background: #d9f0d9; }
.controls button.disagree { background: #ffd9d9; }
.controls button.skip { background: #f0e6c0; }
.nav { margin-top: 1em; }
.progress { color: #666; }</style>
</head>
<body>
<header>
  <h1>TTA verification (v0.1.1)</h1>
  <span class="progress">Trial <span id="cur">1</span> of <span id="total"></span></span>
</header>
<div id="trial-card-host"></div>
<div class="nav">
  <button id="prev">Previous</button>
  <button id="next">Next</button>
  <button id="export">Export verifications</button>
</div>
<script>
var TRIALS = [{"nct_id": "NCT01035255", "review_id": "CDFAKE001_pub1", "review_doi": "10.1002/14651858.CD012612.pub2", "Study": "McMurray 2014", "bridge_method": "dossiergap_direct", "registered_outcome": "Composite endpoint of CV death and HF hospitalisation", "ma_extracted_outcome": "CV death or HF hosp", "outcome_drift": "identical", "registered_n": 8442, "ma_n": 8442, "n_drift": "not_flagged", "registered_effect_log": -0.2231435513142097, "ma_effect_log": -0.223, "direction_concordance": "concordant", "results_posting": "posted"}, {"nct_id": "NCT02861534", "review_id": "CDFAKE001_pub1", "review_doi": "10.1002/14651858.CD013650.pub2", "Study": "Armstrong 2020", "bridge_method": "dossiergap_direct", "registered_outcome": "Time to first occurrence of CV death or HF hospitalisation", "ma_extracted_outcome": "CV death or HF hosp", "outcome_drift": "refinement", "registered_n": 5050, "ma_n": 5050, "n_drift": "not_flagged", "registered_effect_log": -0.10536051565782628, "ma_effect_log": -0.105, "direction_concordance": "concordant", "results_posting": "posted"}, {"nct_id": "NCT99999001", "review_id": "CDFAKE002_pub1", "review_doi": "10.1002/14651858.CDFAKE001.pub1", "Study": "Synthetic-NDrift 2018", "bridge_method": "dossiergap_direct", "registered_outcome": "All-cause mortality", "ma_extracted_outcome": "Mortality", "outcome_drift": "identical", "registered_n": 1000, "ma_n": 700, "n_drift": "flagged", "registered_effect_log": -0.15082288973458366, "ma_effect_log": -0.15, "direction_concordance": "concordant", "results_posting": "required_not_posted"}, {"nct_id": null, "review_id": "CDFAKE002_pub1", "review_doi": "10.1002/14651858.CDFAKE002.pub1", "Study": "Unknown Author 1999", "bridge_method": "unbridgeable", "registered_outcome": null, "ma_extracted_outcome": "Mortality", "outcome_drift": "unscoreable", "registered_n": null, "ma_n": 200, "n_drift": "unscoreable", "registered_effect_log": null, "ma_effect_log": -0.05, "direction_concordance": "unscoreable", "results_posting": "not_required"}, {"nct_id": "NCT01106014", "review_id": "CDFAKE003_pub1", "review_doi": "10.1002/14651858.CD011162.pub2", "Study": "Sitbon 2015", "bridge_method": "dossiergap_direct", "registered_outcome": "Composite morbidity-mortality endpoint", "ma_extracted_outcome": "Morbidity-mortality composite", "outcome_drift": "identical", "registered_n": 1156, "ma_n": 1156, "n_drift": "not_flagged", "registered_effect_log": -0.4942963218147801, "ma_effect_log": -0.4943, "direction_concordance": "concordant", "results_posting": "posted"}];
var STORAGE_KEY = "tta/trial-truthfulness-atlas/verification-v0.1.0";
var idx = 0;

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
  catch (e) { return {}; }
}
function save(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function record(decision) {
  var state = load();
  var t = TRIALS[idx];
  state[t.nct_id || ("__row__" + idx)] = {
    decision: decision,
    at: new Date().toISOString(),
    snapshot: t
  };
  save(state);
  next();
}
// HTML-entity-escape — required because innerHTML is used below for
// performance. Without this, a study label with <img onerror=...> XSSes.
function esc(v) {
  if (v === null || v === undefined) return "—";
  return String(v).replace(/&/g, "&amp;").replace(/</g, "&lt;")
                  .replace(/>/g, "&gt;").replace(/"/g, "&quot;")
                  .replace(/'/g, "&#39;");
}
// CSS class fragments must be alphanumeric/underscore — guard against
// injection of attribute-breaking characters via flag values.
var SAFE_CLASS_RE = /^[a-z_]+$/;
function safeClass(v) {
  return SAFE_CLASS_RE.test(String(v)) ? String(v) : "unknown";
}
// Backward-compat alias (pre-XSS-fix code referenced fmt()).
function fmt(v) { return esc(v); }
function render() {
  if (!TRIALS.length) {
    document.getElementById("trial-card-host").innerHTML =
      '<div class="trial-card"><h2>No trials to review</h2>'
      + '<p>The atlas is empty. Run <code>tta build --fixture-mode</code> '
      + 'to populate it.</p></div>';
    document.getElementById("prev").disabled = true;
    document.getElementById("next").disabled = true;
    return;
  }
  var t = TRIALS[idx];
  var flags = ["bridge_method", "outcome_drift", "n_drift",
               "direction_concordance", "results_posting"];
  var rows = "";
  rows += '<div class="flag-row"><span class="flag-label">NCT</span>'
        + '<span class="flag-value">' + fmt(t.nct_id) + '</span></div>';
  rows += '<div class="flag-row"><span class="flag-label">Study</span>'
        + '<span class="flag-value">' + fmt(t.Study) + '</span></div>';
  rows += '<div class="flag-row"><span class="flag-label">Review DOI</span>'
        + '<span class="flag-value">' + fmt(t.review_doi) + '</span></div>';
  rows += '<div class="flag-row"><span class="flag-label">Registered outcome</span>'
        + '<span class="flag-value">' + fmt(t.registered_outcome) + '</span></div>';
  rows += '<div class="flag-row"><span class="flag-label">MA outcome</span>'
        + '<span class="flag-value">' + fmt(t.ma_extracted_outcome) + '</span></div>';
  rows += '<div class="flag-row"><span class="flag-label">Registered N</span>'
        + '<span class="flag-value">' + fmt(t.registered_n) + '</span></div>';
  rows += '<div class="flag-row"><span class="flag-label">MA N</span>'
        + '<span class="flag-value">' + fmt(t.ma_n) + '</span></div>';
  for (var i = 0; i < flags.length; i++) {
    var f = flags[i];
    var raw = t[f];
    var v = esc(raw);
    var cls = safeClass(raw);
    rows += '<div class="flag-row"><span class="flag-label">' + esc(f) + '</span>'
          + '<span class="flag-value flag-value-' + cls + '">' + v + '</span></div>';
  }
  document.getElementById("trial-card-host").innerHTML =
    '<div class="trial-card"><h2>' + fmt(t.Study) + '</h2>' + rows
    + '<div class="controls">'
    + '<button class="confirm" data-trial-index="' + idx + '" onclick="record('confirm')">Confirm</button>'
    + '<button class="disagree" onclick="record('disagree')">Disagree</button>'
    + '<button class="skip" onclick="record('skip')">Skip</button>'
    + '</div></div>';
  document.getElementById("cur").textContent = (idx + 1);
}
function next() {
  if (idx < TRIALS.length - 1) { idx += 1; }
  render();
}
function prev() {
  if (idx > 0) { idx -= 1; }
  render();
}
function downloadJson() {
  var blob = new Blob([JSON.stringify(load(), null, 2)],
    {type: "application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  document.body.appendChild(a);
  a.href = url;
  a.download = "tta-verifications.json";
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1000);
}
document.getElementById("total").textContent = TRIALS.length;
document.getElementById("prev").onclick = prev;
document.getElementById("next").onclick = next;
document.getElementById("export").onclick = downloadJson;
render();
</script>
</body>
</html>
